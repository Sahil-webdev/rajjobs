services:
  # Backend API Service
  - type: web
    name: rajjobs-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMS_ENABLED
        value: false
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: https://rajjobs-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://rajjobs-frontend.onrender.com,https://rajjobs-admin.onrender.com
      - key: EMAIL_ENABLED
        value: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      # Backend's own public URL — used to build absolute PDF URLs (local-storage fallback)
      - key: BACKEND_URL
        value: https://rajjobs-backend.onrender.com
      # ── Cloudinary (add these in Render Dashboard > Environment for persistent PDFs) ──
      # - key: CLOUDINARY_CLOUD_NAME
      #   value: your_cloud_name
      # - key: CLOUDINARY_API_KEY
      #   value: your_api_key
      # - key: CLOUDINARY_API_SECRET
      #   value: your_api_secret

  # Web Frontend (Public Website)
  - type: web
    name: rajjobs-frontend
    env: node
    rootDir: web-frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://rajjobs-backend.onrender.com

  # Admin Frontend (Admin Panel)
  - type: web
    name: rajjobs-admin
    env: node
    rootDir: admin-frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://rajjobs-backend.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://rajjobs-backend.onrender.com

